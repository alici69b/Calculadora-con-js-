<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora con js</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
  </head>
  <body class="bg-gray-100">
    <div class="max-w-screen min-h-screen flex justify-center items-center">
      
      <div class="flex flex-col items-center p-6 w-80 bg-gray-600 rounded-2xl shadow-2xl gap-4">
        
        <div id="display" class="w-full h-25 bg-gray-300 rounded-xl flex items-center justify-end px-4 text-3xl">
          
        </div>

        <div class="grid grid-cols-4 gap-2 w-full">
        <div class="p-4 bg-orange-400 text-white rounded-lg text-center cursor-pointer hover:bg-orange-500 font-bold" onclick="borrar('')">AC</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('%')">%</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('/')">/</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('x')">x</div>
        
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('7')">7</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('8')">8</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('9')">9</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('-')">-</div>
        
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('4')">4</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('5')">5</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('6')">6</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('+')">+</div>
        
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('1')">1</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('2')">2</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('3')">3</div>
        
        <div class="p-4 bg-orange-500 text-white rounded-lg text-center cursor-pointer hover:bg-orange-600 font-bold flex items-center justify-center row-span-2" onclick="calcular('')">=</div>

        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500 col-span-2" onclick="agregar('0')">0</div>
        <div class="p-4 bg-gray-400 text-white rounded-lg text-center cursor-pointer hover:bg-gray-500" onclick="agregar('.')">.</div>
      </div>
        
      </div>
    </div>
  </body>
</html>
